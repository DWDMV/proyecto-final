project:
  type: website
  output-dir: docs
  resources:
    - "robots.txt"
  render: 
    - "mds/**/*.qmd"
    - "mds/**/*.md"
    - "notebooks/**/*.ipynb"

execute:
  freeze: false                 # Re-computes code scripts on every cloud run
  execute-notebooks: true       # CRITICAL: Forces execution of .ipynb files

website:
  title: "Proyecto Final — Minería de Datos COVID-19"
  site-url: "https://dwdmv.github.io/proyecto-final/"
  navbar:
    left:
      - href: mds/index.qmd
        text: "Inicio"
      - href: mds/PROPUESTA.md
        text: "Propuesta"
      - href: notebooks/01_preprocesamiento.ipynb
        text: "Preprocesamiento de datos"
      - href: notebooks/02_eda.ipynb
        text: "EDA"
      - href: notebooks/03_modelo_supervisado.ipynb
        text: "Modelo Supervisado"
      - href: notebooks/04_clustering.ipynb
        text: "Clustering"
      - href: notebooks/05_demo_modelo.ipynb
        text: "Demo"
      - href: mds/about.qmd
        text: "Sobre el Equipo"

format:
  html:
    theme:
      - cosmo
      - brand
    css: src/styles/styles.css
    toc: true
    code-fold: true             # Wraps all Python cells in interactive dropdown toggles
    code-summary: "View Python Code"
